<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-300 min-h-screen flex items-center justify-center">
    <main
        class="bg-white border max-h-[600px] max-w-[400px] shadow-indigo-500 shadow-6xl sm:w-1/3 md:w-1/2  px-4 rounded-2xl items-center justify-center pt-4 py-4 space-y-4">
        <div class="w-full text-center">
            <img src="images/9217728.png" alt="profile" class="w-14 border rounded-lg bg-blue-100 mx-auto block">
            <div>
                <h1 class="font-bold text-2xl">Welcome back</h1>
                <p class="text-md text-gray-700">Enter your credentials to access your account</p>
            </div>
        </div>
        <form class="w-full space-y-6">
            <div class="space-y-2">
                <label class="font-semibold">Email Address</label>
                <input type="email" placeholder="name@company.com"
                     required class="w-full border-2 rounded-lg bg-gray-200 px-3 py-2">
            </div>

            <div class="flex flex-col space-y-2">
                <label class="font-semibold">Password</label>
                <input type="password" placeholder="........" required minlength=8 class="w-full border-2 rounded-lg bg-gray-200 px-3 py-2">
            </div>
            <div class="grid grid-cols-2 gap-10">
                <div>
                    <input type="checkbox">
                    <label>Remember me</label>
                </div>
                <div class="items-center">
                    <p class="text-blue-600 font-semibold">Forgot password?</p>
                </div>
            </div>

            <div class="border-2 rounded-lg bg-blue-500">
                <button class="w-full text-white font-semibold text-lg text-center py-3 rounded-xl">
                    Log In ➡️
                </button>
            </div>
        </form>
        <div class="w-full mb-10">
            <p class="text-center">Don't have an account yet?<a href="register.html"
                    class="text-purple-700 underline font-semibold">Sign up for free</a></p>
        </div>

    </main>
</body>

</html>
