<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-300 min-h-screen flex items-center justify-center">
    <main class="bg-white shadow-xl  sm:w-1/4 md:w-1/3 max-w-md  w-80 border px-4 rounded-2xl items-center justify-center pt-4 py-4 space-y-4">
        <div class="w-full text-center">
            <img src="./user-profile.png" alt="profile" class="w-16 mx-auto block">
            <div>
                <h1 class="font-bold text-2xl">Create Account</h1>
                <p class="text-md text-gray-700">Join us today! It only takes a minute.</p>
            </div>
        </div>
        <form class="w-full space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2  gap-4">
                <div class="space-y-2">
                    <label class="font-semibold">Full Name</label>
                    <input type="text" placeholder="Jhon Doe" class="w-full border-2 rounded-lg bg-gray-200 px-3 py-2">
                </div>
                <div class="space-y-2">
                    <label class="font-semibold">Email Address</label>
                    <input type="email" placeholder="name@company.com" class="w-full border-2 rounded-lg bg-gray-200 px-3 py-2">
                </div>
            </div>
            <div class="flex flex-col space-y-2">
                <label class="font-semibold">Password</label>
                 <input type="password" placeholder="........" class="w-full border-2 rounded-lg bg-gray-200 px-3 py-2">
            </div>
            <div class="flex flex-col space-y-2">
                <label class="font-semibold">Confirm Password</label>
                 <input type="password" placeholder="........" class="w-full border-2 rounded-lg bg-gray-200 px-3 py-2" >
            </div>
            <div>
                <input type="checkbox">
                <label class="text-sm">I agree to the <a href="#" class="underline text-purple-700">Terms of Service</a> and <a href="#" class="underline text-purple-700">Privacy Policy.</a></label>
            </div>
            <div class="border-2 rounded-lg bg-blue-500">
                <button class="w-full text-white font-semibold text-lg text-center py-3 rounded-xl">
                    Create My Account>>
                </button>
            </div>
        </form>
        <div class="w-full mb-10">
            <p class="text-center">Already have an account?<a href="Sign up" class="text-purple-700 font-semibold">Sign in here</a></p>
        </div>

    </main>
</body>
</html>
